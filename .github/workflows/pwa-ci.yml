name: PWA CI

on:
  push:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pwa/**'
      - '.github/workflows/pwa-ci.yml'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pwa
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if PWA is initialized
        id: pwa-check
        run: |
          if [ -f package.json ]; then
            echo "initialized=true" >> $GITHUB_OUTPUT
          else
            echo "initialized=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.pwa-check.outputs.initialized == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        if: steps.pwa-check.outputs.initialized == 'true'
        run: npm ci

      - name: Run validation
        if: steps.pwa-check.outputs.initialized == 'true'
        run: npm run verify

      - name: Deploy Cloudflare Pages preview
        if: steps.pwa-check.outputs.initialized == 'true' && github.event_name == 'pull_request'
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            npx wrangler pages deploy dist --project-name signallq-pwa --branch "${{ github.head_ref }}"
          else
            echo "Cloudflare secrets ausentes; preview deploy skipped."
          fi

      - name: Deploy Cloudflare Pages production
        if: steps.pwa-check.outputs.initialized == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            npm run pages:deploy
          else
            echo "Cloudflare secrets ausentes; production deploy skipped."
          fi

      - name: PWA not initialized
        if: steps.pwa-check.outputs.initialized == 'false'
        run: echo "⚠️  PWA project not yet initialized (no pwa/package.json found). Skipping CI."

      - name: Upload build output
        if: steps.pwa-check.outputs.initialized == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-build
          path: pwa/dist/
          if-no-files-found: ignore
