name = "signallq-diagnostic"
main = "src/index.ts"
compatibility_date = "2026-05-09"

[observability]
enabled = true

[vars]
# Ruleset remoto opcional para a issue GH#952.
# Sem esta var, o worker usa o ruleset bundled local.
DIAGNOSTIC_RULESET_JSON = ""

# Seed opcional do diretório de provedores para a issue GH#951.
# Sem esta var, o worker usa o catálogo seeded em src/provider-directory.ts.
PROVIDER_DIRECTORY_SEED_JSON = "[]"

# Seed opcional do catálogo remoto de jogos para a issue GH#935.
# Sem esta var, o worker usa o catálogo seeded em src/game-catalog.ts.
GAME_CATALOG_SEED_JSON = "[]"

# Seed opcional dos perfis de sensibilidade de jogos.
# Sem esta var, o worker usa os perfis seeded em src/game-catalog.ts.
GAME_PROFILE_SEED_JSON = "[]"

# GH#960 — origem permitida pra CORS em /admin/* (mesmo padrao do
# signallq-admin-worker, que serve o SignallQ Console). Sem esta var,
# Access-Control-Allow-Origin fica vazio (nenhuma origem liberada).
ALLOWED_ORIGIN = "https://signallq-admin-panel.pages.dev"

# GH#965 — dominio publico do bucket R2 usado para montar ProviderLogo.url
# (ex.: "https://assets.signallq.com" ou o dominio r2.dev). PENDENTE: so tem
# efeito depois que o bucket [[r2_buckets]] acima for criado e descomentado.
# Sem esta var, uploadProviderLogo grava a URL como o proprio r2_key relativo
# (nao quebra, mas nao resolve pra um link publico de verdade).
PROVIDER_LOGO_PUBLIC_BASE_URL = ""

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "signallq-diagnostic-db"
database_id = "00000000-0000-0000-0000-000000000000"

# GH#965 — bucket R2 para hospedar logo real de provedor (ProviderLogo.url).
# PENDENTE: R2 ainda NAO esta habilitado nesta conta Cloudflare. Verificado em
# 2026-07-14 via `wrangler r2 bucket list`:
#   "Please enable R2 through the Cloudflare Dashboard. [code: 10042]"
# Passos para ativar (manual, feito por humano com acesso ao dashboard):
#   1. Habilitar R2 em https://dash.cloudflare.com -> conta -> R2
#   2. `npx wrangler r2 bucket create signallq-provider-logos`
#   3. Descomentar o bloco [[r2_buckets]] abaixo
#   4. Configurar PROVIDER_LOGO_PUBLIC_BASE_URL (dominio publico do bucket ou
#      dominio customizado) em [vars] ou via `wrangler secret put`
# Ate la, `uploadProviderLogo` (src/provider-directory.ts) retorna erro 501
# tratado — nunca finge sucesso nem quebra o worker.
#
# [[r2_buckets]]
# binding = "PROVIDER_LOGOS"
# bucket_name = "signallq-provider-logos"

